[build]
  command = "npm run build"
  publish = "out"

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888
  autoLaunch = false

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Rewrite dynamic topic routes to the placeholder page
[[redirects]]
  from = "/topics/*"
  to = "/topics/_placeholder.html"
  status = 200

# Rewrite dynamic course routes to the placeholder page
[[redirects]]
  from = "/courses/*"
  to = "/courses/_placeholder.html"
  status = 200

# Rewrite dynamic library routes to the placeholder page
[[redirects]]
  from = "/library/*"
  to = "/library/_placeholder.html"
  status = 200

# Rewrite dynamic flashcard routes to the placeholder page
[[redirects]]
  from = "/flashcards/*"
  to = "/flashcards/_placeholder.html"
  status = 200
